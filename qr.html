<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Products</title>
</head>

<body>

<script>
  // Create unique session every QR scan
  const sessionId =
    Date.now() + "_" +
    Math.random().toString(36).substring(2, 10);

  // Redirect to product page
  window.location.href =
    "product.html?session=" + sessionId;
</script>

</body>
</html>
